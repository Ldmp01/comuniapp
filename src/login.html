<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hellen Keller</title>
    <link rel="stylesheet" href="css/diseño.css">
</head>

<body class="login-page">
    <div class="login-card">
        <div class="logo-container">
            <img src="img/logo-hellen-keller.png" alt="Logo" class="main-logo">
        </div>
        <h1 class="title-top">Centro</h1>
        <h2 class="brand-name">HELLEN KELLER</h2>

        <form id="formLogin">
            <div class="input-group">
                <label>Acceso Seguro</label>
                <input type="text" placeholder="Usuario" required>
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" placeholder="**********" required>
            </div>
            <button type="submit" class="btn-entrar">ENTRAR</button>
        </form>

        <a href="#" class="link-recovery">Recuperar contraseña (verificación audible)</a>
        
        <p class="help-text">¿Necesita ayuda? <a href="#" class="support-link">Contactar Soporte Técnico</a></p>
        
        <hr class="separator-line">
        
        <div class="system-tag">
            <p>SISTEMA DE GESTIÓN INTERNA - CENTRO HELLEN KELLER V2.4</p>

        </div>
    </div>
    <script src="js/dashboard.js"></script>
    
</body>
</html>
